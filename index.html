<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>채팅</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--accent:#e8ff5a;--text:#f0f0f0;--sub:#555;--danger:#ff5a5a}
html,body{height:100%;background:var(--bg);font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden}

.app{
  display:flex;flex-direction:column;
  position:relative;z-index:1;background:transparent;border-radius:16px;overflow:hidden;
  width:100vw;height:56.25vw; /* 16:9 */
  max-height:100vh;max-width:177.78vh; /* 16:9 반대 */
  margin:auto;
}

/* 헤더 */
.header{padding:14px 18px;border:none;border-bottom:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.07);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 20px rgba(0,0,0,0.3);border-radius:16px}
.header-name{font-size:13px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,0.5)}
.header-nick{font-size:12px;color:var(--sub)}

/* 입장 화면 */
.entry-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;padding:32px;background:transparent}
.entry-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:6px}
.entry-card{display:flex;flex-direction:column;align-items:center;gap:12px;padding:32px 36px;background:rgba(0,10,0,0.88);backdrop-filter:blur(16px);border-radius:8px;border:1px solid rgba(0,255,80,0.25);box-shadow:0 0 30px rgba(0,255,80,0.08),inset 0 0 30px rgba(0,0,0,0.4)}
.entry-label{font-size:10px;color:rgba(0,255,80,0.5);text-align:center;width:100%;margin-bottom:-6px;letter-spacing:2px;text-transform:uppercase;font-family:monospace}
.entry-input{width:260px;background:rgba(0,20,0,0.6);border:1px solid rgba(0,255,80,0.2);border-radius:4px;padding:9px 16px;font-size:13px;color:#00ff50;font-family:'Noto Sans KR',monospace;outline:none;text-align:center;letter-spacing:1px}
.entry-input:focus{border-color:rgba(0,255,80,0.6);box-shadow:0 0 10px rgba(0,255,80,0.15)}
.entry-input::placeholder{color:rgba(0,255,80,0.25)}
.entry-btn{height:40px;width:260px;border-radius:4px;border:1px solid rgba(0,255,80,0.4);background:rgba(0,255,80,0.1);font-size:13px;font-weight:700;color:#00ff50;font-family:monospace;cursor:pointer;margin-top:6px;transition:all .2s;letter-spacing:2px}
.entry-btn:active{transform:scale(.97)}.entry-btn:hover{background:rgba(0,255,80,0.2);box-shadow:0 0 16px rgba(0,255,80,0.2)}
.entry-error{font-size:11px;color:#ff4040;display:none;align-self:flex-start;padding-left:2px;margin-top:-6px;font-family:monospace;letter-spacing:1px}
.entry-error.show{display:block}

/* 채팅 */
.chat-screen{display:flex;flex-direction:column;flex:1;overflow:hidden}
.chat{flex:1;overflow-y:auto;padding:16px 16px 8px;display:flex;flex-direction:column;scrollbar-width:thin;scrollbar-color:#2a2a2a transparent;background:transparent}
.chat::-webkit-scrollbar{width:3px}
.chat::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px}
.msg-wrap{display:flex;animation:slideUp .2s ease;margin-top:3px}
.msg-wrap.me{justify-content:flex-end}
.msg-wrap.other{justify-content:flex-start}
.msg-wrap.gap{margin-top:14px}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-col{display:flex;flex-direction:column;max-width:68%}
.msg-col.me{align-items:flex-end}
.msg-col.other{align-items:flex-start}
.msg-sender{font-size:10px;color:var(--sub);margin-bottom:3px;padding:0 3px}
.bubble{padding:10px 14px;font-size:14px;line-height:1.55;word-break:break-word}
.me .bubble{background:var(--accent);color:#0f0f0f;border-radius:18px 4px 18px 18px}
.other .bubble{background:rgba(36,36,36,0.92);color:var(--text);border-radius:4px 18px 18px 18px}
.msg-time{font-size:10px;color:var(--sub);margin-top:3px;padding:0 3px;display:flex;align-items:center;gap:5px}
.msg-timer{font-size:10px;color:var(--danger);font-weight:600}

/* 입력바 */
.bar{padding:10px 12px;border:none;border-top:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.07);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);box-shadow:0 -2px 20px rgba(0,0,0,0.3);border-radius:16px}
.bar-top{display:flex;align-items:center;gap:8px}
.input{flex:1;background:var(--surface);border:1.5px solid #2a2a2a;border-radius:24px;padding:10px 16px;font-size:14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;transition:border .15s}
.input::placeholder{color:#444}
.input:focus{border-color:#3a3a3a;background:var(--surface2)}
.send{height:40px;padding:0 16px;border-radius:20px;border:none;background:var(--accent);cursor:pointer;flex-shrink:0;font-size:13px;font-weight:700;color:#0f0f0f;font-family:'Noto Sans KR',sans-serif;transition:transform .1s}
.send:disabled{background:#2a2a2a;cursor:default;color:#555}
.send:not(:disabled):active{transform:scale(.92)}

/* 자동삭제 선택 바 */
.bar-bottom{display:flex;align-items:center;gap:6px;padding-top:8px;overflow-x:auto;scrollbar-width:none}
.bar-bottom::-webkit-scrollbar{display:none}
.del-label{font-size:11px;color:var(--sub);flex-shrink:0}
.del-chip{flex-shrink:0;height:26px;padding:0 12px;border-radius:13px;border:1.5px solid #2a2a2a;background:transparent;font-size:11px;color:var(--sub);font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s}
.del-chip.active{border-color:var(--accent);color:var(--accent);background:rgba(232,255,90,0.08)}


.header-ip{font-size:10px;color:#3a3a3a;margin-top:2px}

.img-btn{height:38px;padding:0 12px;border-radius:20px;border:1.5px solid #2a2a2a;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:13px;font-weight:700;color:var(--sub);font-family:'Noto Sans KR',sans-serif;transition:border-color .15s}
.img-btn:hover{border-color:#3a3a3a}
.img-input{display:none}
.bubble-img{max-width:100%;border-radius:12px;display:block;cursor:pointer;margin-bottom:2px}
.img-loading{font-size:12px;color:var(--sub);padding:8px 0}

.typing-indicator{padding:2px 4px 4px;font-size:11px;color:rgba(255,255,255,0.35);min-height:18px;font-style:italic;}
.typing-dot{display:inline-block;animation:blink 1.2s infinite;}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}

.audio-player{display:flex;align-items:center;gap:8px;padding:4px 0}
.audio-player audio{width:300px;height:36px;filter:invert(1) brightness(0.7);}
.audio-name{font-size:11px;color:var(--sub);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.lock-msg{font-size:12px;color:#ff4040;text-align:center;font-family:monospace;letter-spacing:1px;margin-top:-4px}
.msg-actions{display:none;gap:6px;margin-top:4px;}
.msg-wrap.me:hover .msg-actions{display:flex;justify-content:flex-end;}
.msg-action-btn{font-size:10px;color:var(--sub);background:none;border:1px solid #2a2a2a;border-radius:10px;padding:2px 8px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.msg-action-btn:hover{border-color:#555;color:var(--text)}
.msg-action-btn.del{color:#ff5a5a;border-color:#3a2a2a}
.msg-action-btn.del:hover{border-color:#ff5a5a}

.emoji-btn{height:40px;padding:0 12px;border-radius:20px;border:1.5px solid #2a2a2a;background:transparent;font-size:18px;cursor:pointer;flex-shrink:0;transition:border-color .15s;line-height:1}
.emoji-btn:hover{border-color:#3a3a3a}
.emoji-picker{position:absolute;bottom:70px;right:14px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:12px;display:flex;flex-wrap:wrap;gap:6px;width:280px;max-height:200px;overflow-y:auto;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:fadeUp .15s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.emoji-item{font-size:28px;cursor:pointer;padding:4px;border-radius:8px;transition:background .1s;line-height:1}
.emoji-item:hover{background:rgba(255,255,255,0.08)}

.proxy-banner{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:rgba(255,60,60,0.95);color:#fff;font-size:12px;font-weight:700;padding:8px 20px;border-radius:20px;z-index:9999;font-family:monospace;letter-spacing:1px;box-shadow:0 4px 20px rgba(255,0,0,0.3);animation:slideDown .3s ease;white-space:nowrap}

.conn-status{display:flex;align-items:center;gap:5px;font-size:11px;font-family:monospace}
.conn-dot{width:7px;height:7px;border-radius:50%;background:#555;flex-shrink:0;transition:background .3s}
.conn-dot.connected{background:#00ff50;box-shadow:0 0 6px #00ff50}
.conn-dot.connecting{background:#ffaa00;animation:pulse .8s infinite}
.conn-dot.disconnected{background:#ff4040}
.ping-val{font-size:11px;font-family:monospace;font-weight:700}
.ping-good{color:#00ff50}
.ping-mid{color:#ffaa00}
.ping-bad{color:#ff4040}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

@media (max-width: 768px) {
  html, body { display:block; }
  .app {
    width:100vw !important;
    height:100vh !important;
    max-width:100% !important;
    max-height:100% !important;
    border-radius:0 !important;
  }
  .header { border-radius:0 !important; }
  .bar { border-radius:0 !important; }
  .bubble { max-width:80vw !important; font-size:14px !important; }
  .emoji-picker { width:240px !important; right:8px !important; }
  .entry-input { width:80vw !important; max-width:300px !important; }
  .entry-btn { width:80vw !important; max-width:300px !important; }
  .audio-player audio { width:220px !important; }
}

.ai-btn{height:38px;padding:0 12px;border-radius:20px;border:1.5px solid rgba(167,139,250,0.4);background:rgba(124,58,237,0.15);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:12px;font-weight:700;color:#a78bfa;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.ai-btn:hover{background:rgba(124,58,237,0.3);border-color:#a78bfa}
.ai-panel{position:absolute;bottom:70px;left:14px;right:14px;background:#13111e;border:1px solid rgba(167,139,250,0.2);border-radius:16px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,0.6);display:flex;flex-direction:column;max-height:420px;overflow:hidden;animation:fadeUp .15s ease}
.ai-panel-header{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between;background:rgba(124,58,237,0.1)}
.ai-panel-title{font-size:13px;font-weight:700;color:#a78bfa;font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;gap:6px}
.ai-panel-close{font-size:16px;cursor:pointer;color:rgba(255,255,255,0.3);background:none;border:none;line-height:1}
.ai-panel-close:hover{color:#fff}
.ai-messages{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.1) transparent}
.ai-bubble{padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6;max-width:85%;word-break:break-word;white-space:pre-wrap}
.ai-bubble.user{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;align-self:flex-end;border-radius:12px 12px 4px 12px}
.ai-bubble.bot{background:rgba(255,255,255,0.07);color:var(--text);border:1px solid rgba(255,255,255,0.08);align-self:flex-start;border-radius:12px 12px 12px 4px}
.ai-bubble.typing{color:#a78bfa;font-style:italic}
.ai-input-row{display:flex;gap:8px;padding:10px 12px;border-top:1px solid rgba(255,255,255,0.07);background:rgba(0,0,0,0.2)}
.ai-input{flex:1;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:8px 14px;font-size:13px;color:#fff;font-family:'Noto Sans KR',sans-serif;outline:none}
.ai-input::placeholder{color:#444}
.ai-input:focus{border-color:rgba(167,139,250,0.4)}
.ai-send{width:34px;height:34px;border-radius:50%;border:none;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:transform .1s}
.ai-send:disabled{background:rgba(255,255,255,0.1);cursor:not-allowed}
.ai-send:not(:disabled):active{transform:scale(.9)}

.call-btn{height:38px;padding:0 12px;border-radius:20px;border:1.5px solid rgba(74,222,128,0.3);background:rgba(74,222,128,0.1);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:12px;font-weight:700;color:#4ade80;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.call-btn:hover{background:rgba(74,222,128,0.2);border-color:#4ade80}
.call-btn.active{background:rgba(255,90,90,0.2);border-color:#ff5a5a;color:#ff5a5a}


/* 음성 채널 화면 */
.voice-screen{display:none;flex-direction:column;flex:1;overflow:hidden;}
.voice-header{padding:14px 20px;background:rgba(255,255,255,0.07);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:12px;border-radius:16px;flex-shrink:0;}
.voice-back{background:none;border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:5px 12px;color:#888;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.voice-back:hover{border-color:#4ade80;color:#4ade80}
.voice-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:24px;}
.voice-channel-info{text-align:center;}
.voice-channel-name{font-size:22px;font-weight:700;color:#fff;margin-bottom:6px;}
.voice-channel-sub{font-size:13px;color:#555;font-family:monospace;}
.voice-users{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;max-width:400px;}
.voice-user{display:flex;flex-direction:column;align-items:center;gap:8px;}
.voice-avatar{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,0.07);border:2px solid #2a2a2a;display:flex;align-items:center;justify-content:center;font-size:24px;transition:all .3s;position:relative;}
.voice-avatar.speaking{border-color:#4ade80;box-shadow:0 0 16px rgba(74,222,128,0.4);}
.voice-avatar.muted::after{content:'🔇';position:absolute;bottom:-4px;right:-4px;font-size:14px;background:#111;border-radius:50%;padding:1px;}
.voice-username{font-size:11px;color:#888;font-family:monospace;}
.voice-controls{display:flex;gap:12px;align-items:center;}
.voice-control-btn{width:52px;height:52px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:all .15s;}
.voice-mute-btn{background:rgba(255,255,255,0.1);color:#fff;}
.voice-mute-btn.muted{background:rgba(255,90,90,0.2);color:#ff5a5a;}
.voice-mute-btn:hover{transform:scale(1.05);}
.voice-leave-btn{background:rgba(255,90,90,0.8);color:#fff;box-shadow:0 4px 16px rgba(255,90,90,0.4);}
.voice-leave-btn:hover{transform:scale(1.05);background:#ff5a5a;}
.voice-join-btn{background:rgba(74,222,128,0.2);border:1px solid rgba(74,222,128,0.4);color:#4ade80;border-radius:20px;padding:10px 24px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s;}
.voice-join-btn:hover{background:rgba(74,222,128,0.3);}
.voice-channel-btn{height:38px;padding:0 12px;border-radius:20px;border:1.5px solid rgba(74,222,128,0.3);background:rgba(74,222,128,0.1);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:12px;font-weight:700;color:#4ade80;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.voice-channel-btn:hover{background:rgba(74,222,128,0.2);border-color:#4ade80}
.voice-channel-btn.in-channel{background:rgba(255,90,90,0.15);border-color:rgba(255,90,90,0.4);color:#ff5a5a;}

.dtls-badge{font-size:10px;color:#4ade80;font-family:monospace;background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.2);border-radius:10px;padding:2px 8px;display:inline-flex;align-items:center;gap:4px;}
.hidden{display:none!important}
/* 스크린샷 경고 */
.ss-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ss-icon{font-size:52px}
.ss-title{font-size:20px;font-weight:700;color:#ff5a5a}
.ss-sub{font-size:13px;color:#888;text-align:center;line-height:1.7;max-width:260px}
.ss-badge{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#ff5a5a;color:#fff;font-size:12px;font-weight:700;padding:8px 18px;border-radius:20px;z-index:9998;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;animation:slideDown .3s ease}
@keyframes slideDown{from{opacity:0;transform:translate(-50%,-10px)}to{opacity:1;transform:translate(-50%,0)}}

</style>
</head>
<body>
<div class="app">
  <div class="header hidden" id="mainHeader"><div style="display:flex;align-items:center;gap:8px;"><div class="header-name">만두 집사가 만든 기깔나는 채팅</div><div id="onlineCount" style="font-size:11px;color:#4ade80;font-family:monospace;background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.2);border-radius:10px;padding:2px 8px;">👥 0명</div></div>
    
    <div style="text-align:right"><div class="header-nick" id="headerNick"></div><div style="font-size:9px;color:#4ade80;margin-top:2px;text-align:right;">🔒 E2E 암호화</div><div class="header-ip" id="headerIp"></div>
      <div class="conn-status" style="justify-content:flex-end;margin-top:3px"><div class="conn-dot connecting" id="connDot"></div><span class="ping-val ping-mid" id="pingVal">...</span><span style="color:#3a3a3a;font-size:10px;font-family:monospace">ms</span></div></div>
  </div>

  <!-- 입장 화면 -->
  <div class="entry-screen" id="entryScreen">
    
    <div class="entry-label">닉네임</div>
    <input class="entry-input" id="nickInput" placeholder="예) 이헌제" maxlength="10" autocomplete="off"/>
    <div class="entry-label">비밀번호</div>
    <input class="entry-input" type="password" id="pwInput" placeholder="비밀번호 입력" autocomplete="off"/>
    <div class="entry-error" id="pwError">❌ 비밀번호가 틀렸어요</div>
      <div class="lock-msg hidden" id="lockMsg"></div>
    <button class="entry-btn" id="entryBtn">확인</button>
  </div>

  <!-- 채팅 화면 -->
  <div class="chat-screen hidden" id="chatScreen">
    <div class="chat" id="chat"></div>
    <div class="bar">
      <div class="typing-indicator" id="typingIndicator"></div>
      <div class="bar-top">
        <button class="img-btn" id="fileBtn">파일</button>
        <button class="ai-btn" id="aiBtn">🤖 AI</button>
        <button class="voice-channel-btn" id="voiceChannelBtn">🔊 음성</button>
        <input type="file" class="img-input" id="fileInput" accept="image/*,audio/*"/>
        <input class="input" id="msgInput" placeholder="메시지를 입력하세요..." autocomplete="off"/>
        <button class="emoji-btn" id="emojiBtn">😊</button>
        <button class="send" id="sendBtn" disabled>전송</button>
      </div>
      <div class="bar-bottom">
        <span class="del-label">🗑 삭제</span>
        <button class="del-chip active" data-min="0">안함</button>
        <button class="del-chip" data-min="1">1분</button>
        <button class="del-chip" data-min="5">5분</button>

async function renderMsg(m){
  if(m.id === lastMsgId) return;
  lastMsgId = m.id;
  const chat = document.getElementById('chat');
  const isMe = m.sender === myNick;
  const from = isMe ? 'me' : 'other';
  const gap = lastSender !== m.sender;
  lastSender = m.sender;

  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ' + from + (gap ? ' gap' : '');
  wrap.id = 'msg-' + m.id;

  const senderLabel = (!isMe && gap) ? '<div class="msg-sender">' + escHtml(m.sender) + '</div>' : '';
  const time = new Date(m.created_at).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:false});

  // 남은 시간 계산
  let timerHtml = '';
  if(m.delete_at){
    const remaining = Math.max(0, Math.round((new Date(m.delete_at) - Date.now()) / 1000));
    timerHtml = '<span class="msg-timer" id="timer-' + m.id + '">⏱ ' + formatRemaining(remaining) + '</span>';
    // 카운트다운
    startCountdown(m.id, m.delete_at);
  }

  const myIpHtml = isMe ? '<span style="font-size:9px;color:#3a3a3a;margin-left:4px;">· ' + (m.ip ? decrypt(m.ip) : '') + '</span>' : '';
  let decText = '';
  let msgValid = true;
  if(m.text){
    const unpacked = await unpackMessage(m.text, m.sender);
    decText = unpacked.text;
    msgValid = unpacked.valid;
  }
  const decImgUrl = m.image_url ? decrypt(m.image_url) : '';
  const imgHtml = decImgUrl ? '<img class="bubble-img" src="' + decImgUrl + '" onclick="window.open(this.src)" loading="lazy"/>' : '';
  const decAudioUrl = m.audio_url ? decrypt(m.audio_url) : '';
  const audioName = decText || '음악 파일';
  const audioHtml = decAudioUrl ? '<div class="audio-player"><div><div class="audio-name">🎵 ' + escHtml(audioName) + '</div><audio controls src="' + decAudioUrl + '"></audio></div></div>' : '';
  const tamperWarning = !msgValid ? '<div style="font-size:10px;color:#ff4040;margin-top:2px;font-family:monospace;">⚠️ 변조된 메시지</div>' : '';
  const verifiedBadge = msgValid && decText ? '<span style="font-size:9px;color:rgba(0,255,80,0.4);margin-left:4px;font-family:monospace;">✓</span>' : '';
  const textHtml = decText ? '<div class="bubble">' + linkify(decText) + tamperWarning + '</div>' : '';
  const bubbleHtml = m.image_url ? '<div class="bubble" style="padding:6px;">' + imgHtml + '</div>' : m.audio_url ? '<div class="bubble" style="padding:10px 14px;">' + audioHtml + '</div>' : textHtml;
  const actionsHtml = isMe ? '<div class="msg-actions" id="actions-' + m.id + '"><button class="msg-action-btn" onclick="editMsg(' + m.id + ', this)">수정</button><button class="msg-action-btn del" onclick="deleteMsg(' + m.id + ')">삭제</button></div>' : '';
  wrap.innerHTML = '<div class="msg-col ' + from + '">' + senderLabel + bubbleHtml + '<div class="msg-time">' + time + timerHtml + myIpHtml + '</div>' + actionsHtml + '</div>';
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;

  // 내 메시지면 10초 후 수정/삭제 버튼 숨기기
  if(isMe){
    setTimeout(() => {
      const actions = document.getElementById('actions-' + m.id);
      if(actions) actions.remove();
    }, 10000);
  }
}

function formatRemaining(sec){
  if(sec <= 0) return '삭제됨';
  if(sec < 60) return sec + '초 후 삭제';
  return Math.ceil(sec/60) + '분 후 삭제';
}

function startCountdown(msgId, deleteAt){
  const interval = setInterval(() => {
    const el = document.getElementById('timer-' + msgId);
    if(!el){ clearInterval(interval); return; }
    const remaining = Math.max(0, Math.round((new Date(deleteAt) - Date.now()) / 1000));
    el.textContent = '⏱ ' + formatRemaining(remaining);
    if(remaining <= 0){
      clearInterval(interval);
      const wrap = document.getElementById('msg-' + msgId);
      if(wrap) wrap.remove();
      // DB 삭제
      sb.from('messages').delete().eq('id', msgId).then();
    }
  }, 1000);
}

  const others = (data || []).filter(t => {
    if(t.sender === myNick) return false;
    const age = now - new Date(t.updated_at).getTime();
    return age < 10000;
  });
  // 오래된 것 자동 삭제
  (data || []).forEach(t => {
    const age = now - new Date(t.updated_at).getTime();
    if(age >= 10000) sb.from('typing').delete().eq('sender', t.sender).then();
  });
  const el = document.getElementById('typingIndicator');
  if(others.length > 0){
    const names = others.map(t => t.sender).join(', ');
    el.innerHTML = names + ' 님이 입력 중<span class="typing-dot">.</span><span class="typing-dot">.</span><span class="typing-dot">.</span>';

}

// 디바이스 지문 생성
function getDeviceFingerprint(){
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  ctx.textBaseline = 'top';
  ctx.font = '14px Arial';
  ctx.fillText('fingerprint', 2, 2);
  const canvasHash = canvas.toDataURL().slice(-20);

  const data = [
    screen.width + 'x' + screen.height,
    screen.colorDepth,
    navigator.language,
    new Date().getTimezoneOffset(),
    canvasHash,
    navigator.hardwareConcurrency || 0,
  ].join('|');

  // 간단한 해시
  let hash = 0;
  for(let i = 0; i < data.length; i++){
    hash = ((hash << 5) - hash) + data.charCodeAt(i);
    hash |= 0;
  }
  return Math.abs(hash).toString(16).padStart(8, '0');
}

async function checkDeviceFingerprint(nick){
  const fp = getDeviceFingerprint();
  const stored = localStorage.getItem('chat_fp');

  if(!stored){
    localStorage.setItem('chat_fp', fp + '|' + nick);
  } else {
    const [storedFp, storedNick] = stored.split('|');
    if(storedFp === fp && storedNick !== nick){
      // 같은 기기에서 다른 닉네임으로 재접속
      const banner = document.createElement('div');
      banner.className = 'proxy-banner';
      banner.style.background = 'rgba(255,160,0,0.95)';
      banner.textContent = '⚠️ 이전에 [' + storedNick + '] 로 접속한 기기예요';
      document.body.appendChild(banner);
      setTimeout(() => banner.remove(), 5000);
      // 채팅에 시스템 메시지
      await sb.from('messages').insert({ text: '🔍 ' + nick + '님은 이전에 [' + storedNick + '] 로 접속한 기기예요.', sender: '⚠️ 시스템', ip: '' });
    }
    localStorage.setItem('chat_fp', fp + '|' + nick);
  }
}

// 메시지 무결성 + 서명
const HMAC_KEY = CORRECT_PW + '_integrity';

async function signMessage(text, sender){
  const encoder = new TextEncoder();
  const keyData = encoder.encode(HMAC_KEY);
  const msgData = encoder.encode(text + '|' + sender);
  const cryptoKey = await crypto.subtle.importKey('raw', keyData, { name:'HMAC', hash:'SHA-256' }, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', cryptoKey, msgData);
  return Array.from(new Uint8Array(sig)).map(b => b.toString(16).padStart(2,'0')).join('').slice(0,16);
}

async function verifyMessage(text, sender, signature){
  if(!signature) return true; // 구버전 메시지는 통과
  const expected = await signMessage(text, sender);
  return expected === signature;
}

async function packMessage(text, sender){
  const sig = await signMessage(text, sender);
  // 무결성 해시 포함해서 암호화
  const payload = JSON.stringify({ t: text, s: sig });
  return encrypt(payload);
}

async function unpackMessage(encrypted, sender){
  try {
    const raw = decrypt(encrypted);
    if(!raw) return { text: '', valid: true };
    // JSON 형식이면 새 포맷
    if(raw.startsWith('{')){
      const { t, s } = JSON.parse(raw);
      const valid = await verifyMessage(t, sender, s);
      return { text: t, valid };
    }
    // 구버전 평문
    return { text: raw, valid: true };
  } catch(e){
    return { text: decrypt(encrypted) || '', valid: true };
  }
}

let voiceChannel = 'general';

async function joinVoiceChannel(){
  try {
    voiceStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch(e){
    alert('마이크 권한이 필요해요: ' + e.message);
    return;
  }

  voiceInChannel = true;

  // DB 등록
  await sb.from('voice_channels').delete().eq('sender', myNick);
  await sb.from('voice_channels').insert({ channel: voiceChannel, sender: myNick, updated_at: new Date().toISOString() });

  // 기존 참여자들에게 offer 전송
  const { data: existingUsers } = await sb.from('voice_channels').select('*').eq('channel', voiceChannel).neq('sender', myNick);
  for(const u of (existingUsers || [])){
    await initPeer(u.sender);
  }

  document.getElementById('voiceChannelBtn').classList.add('in-channel');
  document.getElementById('voiceChannelBtn').textContent = '🔊 참여중';
  startSpeakingDetection();
}

async function leaveVoiceChannel(){
  voiceInChannel = false;
  voiceMuted = false;

  if(speakingInterval){ clearInterval(speakingInterval); speakingInterval = null; }
  if(voiceStream){ voiceStream.getTracks().forEach(t => t.stop()); voiceStream = null; }

  // 피어 연결 해제
  Object.entries(voicePeers).forEach(([nick, pc]) => {
    pc.close();
    const audio = document.getElementById('audio-' + nick);
    if(audio) audio.remove();
  });
  voicePeers = {};

  await sb.from('voice_channels').delete().eq('sender', myNick);
  await sb.from('voice_signals').insert({ channel: voiceChannel, sender: myNick, receiver: 'all', type: 'leave', data: '' }).catch(()=>{});

  updateVoiceUI();
  document.getElementById('voiceChannelBtn').classList.remove('in-channel');
  document.getElementById('voiceChannelBtn').textContent = '🔊 음성';
  const badge = document.getElementById('dtlsBadge');
  if(badge) badge.style.display = 'none';
}

async function initPeer(targetNick){
  if(voicePeers[targetNick]) return;
  const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] });
  voicePeers[targetNick] = pc;

  // 내 오디오 트랙 추가
  voiceStream.getTracks().forEach(t => pc.addTrack(t, voiceStream));

  // ICE candidate
  pc.onicecandidate = async e => {
    if(e.candidate){
      await sb.from('voice_signals').insert({ channel: voiceChannel, sender: myNick, receiver: targetNick, type: 'candidate', data: encryptSignal(e.candidate) });
    }
  };

  // 상대방 오디오 수신
  pc.ontrack = e => {
    let audio = document.getElementById('audio-' + targetNick);
    if(!audio){
      audio = document.createElement('audio');
      audio.id = 'audio-' + targetNick;
      audio.autoplay = true;
      audio.playsInline = true;
      document.body.appendChild(audio);
    }
    audio.srcObject = e.streams[0];
    // speaking 감지
    detectRemoteSpeaking(e.streams[0], targetNick);
  };

  pc.onconnectionstatechange = () => {
    if(pc.connectionState === 'connected'){
      setTimeout(() => checkDTLS(pc, targetNick), 2000);
    }
  };

  // offer 생성
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await sb.from('voice_signals').insert({ channel: voiceChannel, sender: myNick, receiver: targetNick, type: 'offer', data: encryptSignal(offer) });

  return pc;
}

async function handleOffer(sender, encData){
  if(!voiceInChannel) return;
  const offerData = decryptSignal(encData);
  if(!offerData) return;

  if(voicePeers[sender]) voicePeers[sender].close();

  const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] });
  voicePeers[sender] = pc;

  voiceStream.getTracks().forEach(t => pc.addTrack(t, voiceStream));

  pc.onicecandidate = async e => {
    if(e.candidate){
      await sb.from('voice_signals').insert({ channel: voiceChannel, sender: myNick, receiver: sender, type: 'candidate', data: encryptSignal(e.candidate) });
    }
  };

  pc.ontrack = e => {
    let audio = document.getElementById('audio-' + sender);
    if(!audio){
      audio = document.createElement('audio');
      audio.id = 'audio-' + sender;
      audio.autoplay = true;
      audio.playsInline = true;
      document.body.appendChild(audio);
    }
    audio.srcObject = e.streams[0];
    detectRemoteSpeaking(e.streams[0], sender);
  };

  pc.onconnectionstatechange = () => {
    if(pc.connectionState === 'connected'){
      setTimeout(() => checkDTLS(pc, sender), 2000);
    }
  };

  await pc.setRemoteDescription(new RTCSessionDescription(offerData));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await sb.from('voice_signals').insert({ channel: voiceChannel, sender: myNick, receiver: sender, type: 'answer', data: encryptSignal(answer) });
}

function detectRemoteSpeaking(stream, nick){
  try {
    const ctx = new AudioContext();
    const analyser = ctx.createAnalyser();
    const src = ctx.createMediaStreamSource(stream);
    src.connect(analyser);
    analyser.fftSize = 256;
    const buf = new Uint8Array(analyser.frequencyBinCount);
    setInterval(() => {
      analyser.getByteFrequencyData(buf);
      const avg = buf.reduce((a,b) => a+b, 0) / buf.length;
      const avatar = document.getElementById('voice-avatar-' + nick);
      if(avatar) avatar.className = 'voice-avatar' + (avg > 8 ? ' speaking' : '');
    }, 100);
  } catch(e){}
}

function startSpeakingDetection(){
  if(!voiceStream) return;
  try {
    const ctx = new AudioContext();
    const analyser = ctx.createAnalyser();
    const src = ctx.createMediaStreamSource(voiceStream);
    src.connect(analyser);
    analyser.fftSize = 256;
    const buf = new Uint8Array(analyser.frequencyBinCount);
    speakingInterval = setInterval(() => {
      analyser.getByteFrequencyData(buf);
      const avg = buf.reduce((a,b) => a+b, 0) / buf.length;
      const avatar = document.getElementById('voice-avatar-' + myNick);
      if(avatar) avatar.className = 'voice-avatar' + (avg > 8 && !voiceMuted ? ' speaking' : '') + (voiceMuted ? ' muted' : '');
    }, 100);
  } catch(e){}
}

    btn.textContent = voiceMuted ? '🔇' : '🎙️';

function subscribeVoice(){

    .subscribe();

  sb.channel('public:voice_signals')
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'voice_signals' }, async payload => {
      const s = payload.new;
      if(s.sender === myNick) return;
      if(s.receiver !== myNick && s.receiver !== 'all') return;
      if(!voiceInChannel && s.type !== 'leave') return;

      if(s.type === 'offer'){
        await handleOffer(s.sender, s.data);

      } else if(s.type === 'answer'){
        const pc = voicePeers[s.sender];
        const answerData = decryptSignal(s.data);
        if(pc && answerData) await pc.setRemoteDescription(new RTCSessionDescription(answerData));

      } else if(s.type === 'candidate'){
        const pc = voicePeers[s.sender];
        const candidateData = decryptSignal(s.data);
        if(pc && candidateData) try { await pc.addIceCandidate(new RTCIceCandidate(candidateData)); } catch(e){}

      } else if(s.type === 'leave'){
        const pc = voicePeers[s.sender];
        if(pc){ pc.close(); delete voicePeers[s.sender]; }
        const audio = document.getElementById('audio-' + s.sender);
        if(audio) audio.remove();
        loadVoiceUsers();
      }
    })
    .subscribe();
}


// 시그널 데이터 암호화 (채팅 비밀번호 키 사용)
function encryptSignal(data){
  return CryptoJS.AES.encrypt(JSON.stringify(data), encKey).toString();
}

function decryptSignal(cipher){
  try {
    const bytes = CryptoJS.AES.decrypt(cipher, encKey);
    return JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
  } catch(e){ return null; }
}

// DTLS 암호화 확인
async function checkDTLS(pc, peerNick){
  try {
    const stats = await pc.getStats();
    let isDTLS = false;
    stats.forEach(report => {
      if(report.type === 'transport' && report.dtlsState === 'connected'){
        isDTLS = true;
      }
    });
    const badge = document.getElementById('dtlsBadge');
    if(badge && isDTLS){
      badge.style.display = 'inline-flex';
      badge.title = peerNick + ' 와 DTLS 암호화 연결됨';
    }
  } catch(e){}
}

function escHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

document.getElementById('msgInput').addEventListener('input', e => {
  document.getElementById('sendBtn').disabled = !e.target.value.trim();
  if(e.target.value.trim()){
    setTyping(true);
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => setTyping(false), 3000);
  } else {
    setTyping(false);
  }
});
document.getElementById('msgInput').addEventListener('keydown', e => {
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}
});
document.getElementById('sendBtn').addEventListener('click', send);
